        window.onload = function() {
            if (isFirebaseConnected) {
                db.ref("exams").on("value", (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        for (let yr in data) {
                            if (rawExamData[yr]) {
                                data[yr].forEach(updatedItem => {
                                    let match = rawExamData[yr].find(o => o.id === updatedItem.id);
                                    if (match) {
                                        match.ans = updatedItem.ans;
                                        match.updatedBy = updatedItem.updatedBy;
                                        match.updatedAt = updatedItem.updatedAt;
                                    }
                                });
                            }
                        }
                        resetCurrentYearData();
                    }
                    renderQuiz();
                });
            } else {
                resetCurrentYearData();
                renderQuiz();
            }
        };

        function resetCurrentYearData() {
            liveExamData[activeYear] = JSON.parse(JSON.stringify(rawExamData[activeYear]));
            liveExamData[activeYear].forEach(item => {
                item.originalChoices = [...item.a]; 
            });
            userAnswers = {}; 
        }

        // ==========================================================
        // 3. ระบบสุ่มลำดับข้อและตัวเลือก (Random Mode) 🎲
        // ==========================================================
        function randomizeQuestions() {
            userAnswers = {}; 
            let list = liveExamData[activeYear];

            for (let i = list.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [list[i], list[j]] = [list[j], list[i]];
            }

            list.forEach(item => {
                if (!item.originalChoices) {
                    item.originalChoices = [...item.a];
                }
                const correctText = item.originalChoices[item.ans - 1];

                for (let i = item.a.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [item.a[i], item.a[j]] = [item.a[j], item.a[i]];
                }
                item.ans = item.a.indexOf(correctText) + 1;
            });

            renderQuiz();
            alert("🎲 ทำการสับเปลี่ยนข้อสอบและตัวเลือกให้ใหม่เรียบร้อยแล้ว สามารถกดเปลี่ยนคำตอบไปมาได้อิสระครับ!");
        }

        function switchYear(year) {
            activeYear = year;
            document.querySelectorAll('.year-btn').forEach(btn => {
                btn.classList.remove('bg-white', 'text-blue-700', 'shadow-md');
                btn.classList.add('bg-blue-600', 'text-white', 'hover:bg-blue-500');
            });
            const activeBtn = document.getElementById(`btn-${year}`);
            activeBtn.classList.remove('bg-blue-600', 'text-white', 'hover:bg-blue-500');
            activeBtn.classList.add('bg-white', 'text-blue-700', 'shadow-md');

            renderQuiz();

        // ฟังก์ชันเมื่อคลิกเลือกช้อยส์ (จุดหลักที่อัปเดตใหม่เพื่อให้กดเปลี่ยนคำตอบกี่รอบก็ได้)
        function selectChoice(itemId, choiceNum) {
            userAnswers[itemId] = choiceNum; 
            renderQuiz(); 
        }

        // ==========================================================
        // 4. ส่วนเรนเดอร์หน้าจอหลัก UI (เวอร์ชันรองรับรูปภาพแล้วครับคุณเบียร์ 🖼️)
        // ==========================================================
        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = "";
            const list = liveExamData[activeYear];

            list.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl shadow-sm p-5 border border-gray-100 relative";
                
                const chosenAns = userAnswers[item.id]; 
                const hasAnswered = chosenAns !== undefined;

                let html = `
                    <div class="flex justify-between items-center gap-4 mb-3 border-b border-gray-100 pb-2">
                        <span class="bg-blue-100 text-blue-800 text-xs font-bold px-2.5 py-1 rounded-md">ข้อที่ ${index + 1}</span>
                        <button onclick="openEditModal('${activeYear}', ${item.id})" class="text-xs text-gray-400 hover:text-blue-700 hover:bg-blue-50 px-2 py-1 rounded transition-all">
                            <i class="fa-solid fa-pen-to-square"></i> แก้ไขเฉลยต้นฉบับ
                        </button>
                    </div>
                    <p class="font-semibold text-gray-800 text-base mb-4">${item.q}</p>
                `;

                // 🌟 เพิ่มจุดนี้: เช็กว่าถ้าในข้อมูลมีรูปภาพ (item.img) ให้สร้างแท็กรูปโชว์ขึ้นมา
                if (item.img) {
                    html += `
                        <div class="mb-4 max-w-md mx-auto overflow-hidden rounded-lg border border-gray-200 shadow-sm bg-gray-50 flex justify-center items-center p-2">
                            <img src="${item.img}" alt="รูปประกอบข้อที่ ${index + 1}" class="max-w-full h-auto rounded-md object-contain">
                        </div>
                    `;
                }

                html += `<div class="grid grid-cols-1 gap-2 mb-2">`;

                item.a.forEach((opt, oIdx) => {
                    const currentOptionNum = oIdx + 1;
                    const isCorrectSolution = currentOptionNum === item.ans;
                    const isUserSelection = currentOptionNum === chosenAns;
                    
                    let borderStyle = 'border-gray-200 bg-gray-50 hover:bg-gray-100/70';

                    if (hasAnswered) {
                        if (isCorrectSolution) {
                            borderStyle = 'border-emerald-500 bg-emerald-50 text-emerald-900 font-semibold';
                        } else if (isUserSelection && !isCorrectSolution) {
                            borderStyle = 'border-red-400 bg-red-50 text-red-900 font-semibold';
                        } else {
                            borderStyle = 'border-gray-200 bg-gray-50/50 opacity-60';
                        }
                    }

                    html += `
                        <div onclick="selectChoice(${item.id}, ${currentOptionNum})" class="border ${borderStyle} rounded-lg p-3 flex justify-between items-center text-sm cursor-pointer transition-all">
                            <div class="flex items-center gap-3">
                                <span class="font-medium text-gray-400">${currentOptionNum}.</span>
                                <span class="text-gray-700">${opt}</span>
                            </div>
                        </div>
                    `;
                });

                html += `</div>`;

                if (hasAnswered) {
                    html += `
                        <div class="mt-2 text-xs border border-blue-200 bg-blue-50 text-blue-800 p-2.5 rounded-lg flex items-center gap-1.5 font-semibold animate-fade-in">
                            <i class="fa-solid fa-lightbulb text-amber-500 text-sm"></i> เฉลยคือข้อ ${item.ans}
                        </div>
                    `;
                }

                const originalItem = rawExamData[activeYear].find(o => o.id === item.id);
                if (originalItem && originalItem.updatedBy) {
                    html += `
                        <div class="mt-3 text-[10px] text-gray-400 bg-gray-50 rounded-lg p-2 flex items-center gap-1.5 border border-dashed border-gray-200">
                            <i class="fa-solid fa-cloud text-blue-400"></i>
                            <span>อัปเดตเฉลยล่าสุดโดย: คุณ <b>${escapeHtml(originalItem.updatedBy)}</b></span>
                        </div>
                    `;
                }

                card.innerHTML = html;
                container.appendChild(card);
            });
        }

        // ==========================================================
        // 5. ระบบโมดอลอัปเดตและส่งข้อมูลเข้าคลาวด์ Firebase
        // ==========================================================
        function openEditModal(year, id) {
            const item = rawExamData[year].find(o => o.id === id);
            if (!item) return;

            document.getElementById('modal-year').value = year;
            document.getElementById('modal-q-id').value = id;
            document.getElementById('modal-q-text').innerText = `คำถาม: ${item.q}`;
            
            const optionsContainer = document.getElementById('modal-options-container');
            optionsContainer.innerHTML = "";

            item.a.forEach((opt, oIdx) => {
                const val = oIdx + 1;
                const checked = val === item.ans ? 'checked' : '';
                optionsContainer.innerHTML += `
                    <label class="flex items-center gap-3 p-2.5 rounded-lg border border-gray-200 hover:bg-gray-50 cursor-pointer text-sm font-medium">
                        <input type="radio" name="newAns" value="${val}" ${checked} class="w-4 h-4 text-blue-600 focus:ring-blue-500">
                        <span>${val}. ${opt}</span>
                    </label>
                `;
            });

            document.getElementById('edit-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('edit-modal').classList.add('hidden');
            document.getElementById('edit-form').reset();
        }

        function saveEdit(e) {
            e.preventDefault();
            const year = document.getElementById('modal-year').value;
            const id = parseInt(document.getElementById('modal-q-id').value);
            const user = document.getElementById('modal-user').value.trim();
            const selectedRadio = document.querySelector('input[name="newAns"]:checked');

            if (!selectedRadio || !user) {
                alert("กรุณากรอกข้อมูลให้ครบถ้วนครับ ⚠️");
                return;
            }

            const newAnswerVal = parseInt(selectedRadio.value);
            const now = new Date();
            const timestampStr = now.toLocaleDateString('th-TH', {
                year: 'numeric', month: 'short', day: 'numeric'
            }) + " " + now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }) + " น.";

            if (isFirebaseConnected) {
                db.ref(`exams/${year}`).once('value').then((snapshot) => {
                    let remoteItems = snapshot.val() || [];
                    let itemIdx = remoteItems.findIndex(o => o && o.id === id);

                    if (itemIdx === -1) {
                        remoteItems = JSON.parse(JSON.stringify(rawExamData[year]));
                        itemIdx = remoteItems.findIndex(o => o.id === id);
                    }

                    remoteItems[itemIdx].ans = newAnswerVal;
                    remoteItems[itemIdx].updatedBy = user;
                    remoteItems[itemIdx].updatedAt = timestampStr;

                    db.ref(`exams/${year}`).set(remoteItems)
                        .then(() => {
                            closeModal();
                            alert("🎉 บันทึกการแก้ไขเฉลยเข้าคลาวด์สำเร็จ!");
                        })
                        .catch(err => {
                            alert("เกิดข้อผิดพลาด: " + err.message);
                        });
                });
            } else {
                alert("ระบบออฟไลน์ ไม่สามารถบันทึกข้อมูลขึ้นเซิร์ฟเวอร์หลักได้");
            }
        }

        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
